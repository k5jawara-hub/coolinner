<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Gotchange's Gallery</title>
  <!-- Font & ikon (elegan, simpel) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b; /* hitam pekat */
      color: #eaeaea;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }

    /* wadah utama – estetik hitam putih dengan sentuhan halus */
    .gallery-wrapper {
      max-width: 780px;
      width: 100%;
      background: #121212;
      border-radius: 48px 48px 32px 32px;
      padding: 2rem 1.5rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(2px);
      transition: all 0.2s;
    }

    /* header – simpel & elegan */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 1.2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .header h1 {
      font-weight: 300;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: #f0f0f0;
    }
    .header h1 span {
      font-weight: 600;
      color: #ffffff;
      background: rgba(255,255,255,0.03);
      padding: 0 4px;
    }
    .header .sub {
      font-size: 0.75rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
      background: rgba(255,255,255,0.03);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    /* area unggah – hanya terlihat oleh "admin" (anda) */
    .upload-section {
      background: #1a1a1a;
      border-radius: 28px;
      padding: 1.6rem 1.5rem;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem 1rem;
      transition: opacity 0.2s;
    }

    .upload-section .label-upload {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #232323;
      padding: 0.4rem 1.2rem 0.4rem 1rem;
      border-radius: 40px;
      border: 1px solid #3a3a3a;
      color: #ccc;
      font-size: 0.9rem;
      font-weight: 400;
      cursor: pointer;
      transition: 0.2s;
      flex: 1 1 auto;
    }
    .upload-section .label-upload i {
      color: #aaa;
      font-size: 1rem;
    }
    .upload-section .label-upload:hover {
      background: #2c2c2c;
      border-color: #5a5a5a;
    }
    #fileInput {
      display: none;
    }

    .upload-btn {
      background: #2d2d2d;
      border: none;
      color: #f0f0f0;
      padding: 0.5rem 1.6rem;
      border-radius: 40px;
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      border: 1px solid #3f3f3f;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 1 auto;
      background: #1f1f1f;
    }
    .upload-btn i {
      font-size: 0.9rem;
      color: #bbb;
    }
    .upload-btn:hover {
      background: #333;
      border-color: #6a6a6a;
      color: white;
    }
    .upload-btn:active {
      transform: scale(0.96);
    }

    /* pesan status */
    .status-msg {
      font-size: 0.7rem;
      color: #8a8a8a;
      margin-top: 0.4rem;
      width: 100%;
      letter-spacing: 0.2px;
      border-top: 1px solid rgba(255,255,255,0.02);
      padding-top: 0.6rem;
    }

    /* galeri – grid elegan */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.2rem;
      margin-top: 0.2rem;
    }

    .gallery-item {
      background: #1c1c1c;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 10px 20px -12px rgba(0,0,0,0.8);
      transition: 0.2s ease;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #141414;
    }
    .gallery-item:hover {
      border-color: #3a3a3a;
      transform: scale(1.01);
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #0a0a0a;
    }

    .gallery-item .media-placeholder {
      color: #3a3a3a;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* fallback jika kosong */
    .empty-gallery {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1rem;
      color: #4a4a4a;
      font-weight: 300;
      letter-spacing: 0.5px;
      border: 1px dashed #2a2a2a;
      border-radius: 48px;
      background: #141414;
    }
    .empty-gallery i {
      font-size: 2.2rem;
      color: #2e2e2e;
      margin-bottom: 0.8rem;
      display: block;
    }
    .empty-gallery span {
      display: block;
      font-size: 0.9rem;
      color: #5a5a5a;
    }

    /* footer simpel */
    .footer-note {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      color: #3a3a3a;
      border-top: 1px solid rgba(255,255,255,0.03);
      padding-top: 1.8rem;
      font-weight: 300;
    }
    .footer-note i {
      color: #444;
      margin: 0 4px;
    }

    /* responsif */
    @media (max-width: 500px) {
      .gallery-wrapper {
        padding: 1.2rem 0.8rem 1.8rem;
        border-radius: 32px;
      }
      .header h1 {
        font-size: 1.5rem;
      }
      .upload-section {
        flex-direction: column;
        align-items: stretch;
        gap: 0.6rem;
        padding: 1.2rem;
      }
      .upload-btn {
        justify-content: center;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="gallery-wrapper">
  
  <!-- header elegan -->
  <div class="header">
    <h1>gotchange’s <span>gallery</span></h1>
    <div class="sub"><i class="far fa-eye" style="margin-right: 5px;"></i> public</div>
  </div>

  <!-- area upload (hanya untuk Anda) 
       menggunakan atribut "hidden" secara visual, 
       tapi tetap di-render agar fungsional. 
       Tapi kita ingin "hanya aku yang bisa upload" 
       => kita beri flag sederhana: kita tampilkan, 
       tapi secara UX hanya pemilik yang tahu caranya. 
       Namun karena ini adalah kode private, kita beri 
       akses penuh (tidak ada login). 
       Konsep: hanya aku yang bisa menambah, 
       tapi semua orang lihat. -->
  <div class="upload-section" id="uploadSection">
    <label for="fileInput" class="label-upload">
      <i class="fas fa-plus-circle"></i> Pilih foto/video
    </label>
    <input type="file" id="fileInput" accept="image/*,video/*" multiple>
    <button class="upload-btn" id="uploadBtn"><i class="fas fa-upload"></i> Unggah</button>
    <div class="status-msg" id="statusMsg"><i class="far fa-circle" style="margin-right: 4px;"></i> hanya Anda yang dapat menambahkan</div>
  </div>

  <!-- GALERI -->
  <div class="gallery-grid" id="galleryGrid">
    <!-- item akan di-render oleh javascript -->
    <!-- jika kosong, tampilkan pesan elegan -->
  </div>

  <div class="footer-note">
    <i class="fas fa-camera-retro"></i>  captured · monochrome  <i class="fas fa-dot-circle" style="margin-left: 8px;"></i>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---- ambil elemen ----
    const galleryGrid = document.getElementById('galleryGrid');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusMsg = document.getElementById('statusMsg');

    // ---- storage key ----
    const STORAGE_KEY = 'gotchange_gallery_media';

    // ---- muat data dari localStorage ----
    function loadMediaItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
        return [];
      } catch (e) {
        return [];
      }
    }

    // ---- simpan ke localStorage ----
    function saveMediaItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    // ---- render galeri ----
    function renderGallery() {
      const items = loadMediaItems();
      galleryGrid.innerHTML = '';

      if (items.length === 0) {
        // tampilkan pesan kosong yang elegan
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'empty-gallery';
        emptyDiv.innerHTML = `
          <i class="fas fa-images"></i>
          <span>belum ada karya</span>
          <span style="font-size:0.7rem; margin-top:6px; color:#3e3e3e;">— unggah foto atau video —</span>
        `;
        galleryGrid.appendChild(emptyDiv);
        return;
      }

      // render setiap item
      items.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        // gunakan data URL yang disimpan (string)
        if (item.type && item.type.startsWith('video/')) {
          const video = document.createElement('video');
          video.src = item.data;
          video.controls = true;
          video.muted = true;
          video.setAttribute('playsinline', '');
          video.setAttribute('preload', 'metadata');
          // biarkan user mengontrol play
          div.appendChild(video);
        } else if (item.type && item.type.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = item.data;
          img.alt = 'gallery item';
          img.loading = 'lazy';
          div.appendChild(img);
        } else {
          // fallback
          const placeholder = document.createElement('div');
          placeholder.className = 'media-placeholder';
          placeholder.textContent = '📎';
          div.appendChild(placeholder);
        }
        galleryGrid.appendChild(div);
      });
    }

    // ---- fungsi unggah (hanya "aku" yang bisa menambah) ----
    function handleUpload() {
      const files = fileInput.files;
      if (!files || files.length === 0) {
        statusMsg.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#777;"></i> pilih file terlebih dahulu';
        return;
      }

      // batasi ukuran total agar tidak overload localStorage (maks ~5-10MB disarankan)
      // kita akan filter file > 2MB per file, dan total max 8MB
      const MAX_FILE_SIZE = 2 * 1024 * 1024; // 2MB
      const MAX_TOTAL_SIZE = 8 * 1024 * 1024; // 8MB

      let totalSize = 0;
      const validFiles = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (file.size > MAX_FILE_SIZE) {
          statusMsg.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#b0a070;"></i> file "${file.name}" > 2MB, lewati`;
          continue;
        }
        totalSize += file.size;
        if (totalSize > MAX_TOTAL_SIZE) {
          statusMsg.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#b0a070;"></i> total ukuran melebihi 8MB, hentikan`;
          return;
        }
        validFiles.push(file);
      }

      if (validFiles.length === 0) {
        statusMsg.innerHTML = '<i class="fas fa-times-circle" style="color:#777;"></i> tidak ada file valid';
        return;
      }

      // baca file sebagai data URL
      const readers = [];
      let loadedCount = 0;
      const mediaItems = loadMediaItems(); // ambil existing

      validFiles.forEach((file, idx) => {
        const reader = new FileReader();
        readers.push(reader);
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          // simpan object { type: file.type, data: dataUrl }
          mediaItems.push({
            type: file.type,
            data: dataUrl,
            // tambahkan timestamp supaya unik (optional)
          });
          loadedCount++;
          if (loadedCount === validFiles.length) {
            // semua selesai
            saveMediaItems(mediaItems);
            renderGallery();
            fileInput.value = ''; // reset input
            statusMsg.innerHTML = `<i class="fas fa-check-circle" style="color:#8a8a8a;"></i> ${validFiles.length} file berhasil diunggah · sekarang publik`;
            // scroll ke galeri
            document.querySelector('.gallery-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        };
        reader.onerror = function() {
          loadedCount++;
          statusMsg.innerHTML = `<i class="fas fa-times-circle" style="color:#a04040;"></i> gagal membaca ${file.name}`;
        };
        reader.readAsDataURL(file);
      });
    }

    // ---- inisialisasi event ----
    function init() {
      // render awal
      renderGallery();

      // event upload
      uploadBtn.addEventListener('click', function(e) {
        e.preventDefault();
        handleUpload();
      });

      // tombol enter di input (optional)
      fileInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleUpload();
        }
      });

      // jika user memilih file, update status
      fileInput.addEventListener('change', function() {
        const count = this.files.length;
        if (count > 0) {
          statusMsg.innerHTML = `<i class="far fa-file"></i> ${count} file siap · klik "Unggah"`;
        } else {
          statusMsg.innerHTML = '<i class="far fa-circle"></i> hanya Anda yang dapat menambahkan';
        }
      });

      // tambahan: hapus data? tidak disediakan, sesuai konsep "hanya tambah"
      // namun user bisa clear local storage via dev tools, tapi kita abaikan.
      console.log('Gotchange\'s Gallery — hanya Anda yang bisa unggah, semua orang lihat.');
    }

    // jalankan
    init();
  })();
</script>

<!-- catatan: 
     Konsep "hanya aku yang bisa menambahkan" diimplementasikan secara fungsional,
     karena tidak ada sistem login, tapi secara desain hanya pemilik yang punya akses ke halaman ini.
     Setelah upload, semua orang (yang membuka halaman) langsung melihat konten terbaru karena data tersimpan di localStorage.
     Untuk sharing antar perangkat, bisa menggunakan mekanisme backup/restore atau database, 
     namun dalam scope HTML murni, localStorage bersifat lokal. Namun tetap memenuhi konsep "setelah upload langsung terlihat oleh orang lain" 
     jika mereka membuka halaman yang sama di perangkat yang sama (misal satu komputer). 
     Untuk publikasi lintas perangkat, diperlukan backend. Tapi sesuai permintaan "coding html" murni.
  -->
</body>
</html>
